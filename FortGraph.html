<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>FortGraph: Fortran Dependency Tracker</title>
<style>
/* ── Theme tokens ─────────────────────────────────────────────────────────── */
[data-theme="dark"]{
  --bg-body:linear-gradient(180deg,#071019 0%,#0b1520 52%,#101926 100%);
  --bg-radial1:rgba(73,122,255,0.14);
  --bg-radial2:rgba(16,185,129,0.08);
  --shell-line:rgba(148,163,184,0.18);
  --panel-bg:rgba(12,19,29,0.94);
  --panel-bg-soft:rgba(16,24,37,0.84);
  --panel-border:rgba(148,163,184,0.18);
  --panel-border-strong:rgba(148,163,184,0.28);
  --text:#f5f7fb;
  --muted:#8ea0b8;
  --muted-strong:#c3cedd;
  --input-bg:rgba(10,16,25,0.84);
  --input-border:rgba(148,163,184,0.22);
  --input-hover:rgba(73,122,255,0.12);
  --item-hover:rgba(73,122,255,0.10);
  --item-sel-bg:rgba(73,122,255,0.14);
  --item-sel-border:rgba(96,165,250,0.48);
  --surface-raised:rgba(255,255,255,0.035);
  --surface-muted:rgba(255,255,255,0.028);
  --surface-emphasis:rgba(73,122,255,0.08);
  --surface-danger:rgba(251,113,133,0.10);
  --surface-warning:rgba(245,158,11,0.11);
  --surface-success:rgba(16,185,129,0.11);
  --accent:#74a3ff;
  --accent-strong:#90b5ff;
  --accent-soft:rgba(116,163,255,0.14);
  --accent-glow:rgba(116,163,255,0.24);
  --graph-stroke:rgba(29,41,64,0.2);
  --cy-bg:transparent; --cy-edge-label:#d8e0ea; --cy-edge-text-bg:#0b1420;
  --cy-node-mod:#163255; --cy-node-sub:#1c294d; --cy-node-ext:#263047;
  --accent-m:#79b8ff; --accent-s:#9cb0ff; --accent-e:#9bb0c6;
  --path-color:#f59e0b;
  --path-soft:rgba(245,158,11,0.12); --path-soft2:rgba(245,158,11,0.16); --path-border:rgba(245,158,11,0.38); --path-border2:rgba(245,158,11,0.62);
  --gold:#f59e0b; --red:#fb7185; --green:#10b981; --cyan:#74a3ff; --warm:#fb923c;
  --gold-soft:rgba(245,158,11,0.12); --gold-soft2:rgba(245,158,11,0.09); --gold-border:rgba(245,158,11,0.34); --gold-border2:rgba(245,158,11,0.52);
  --red-soft:rgba(251,113,133,0.12);
  --green-soft:rgba(16,185,129,0.10);
  --muted-soft:rgba(142,160,184,0.12);
  --accent-m-soft:rgba(121,184,255,0.16); --accent-s-soft:rgba(156,176,255,0.16); --accent-e-soft:rgba(155,176,198,0.14);
}
[data-theme="light"]{
  --bg-body:linear-gradient(180deg,#ffffff 0%,#fbfdff 55%,#ffffff 100%);
  --bg-radial1:rgba(37,99,235,0.035);
  --bg-radial2:rgba(16,185,129,0.02);
  --shell-line:rgba(15,23,42,0.10);
  --panel-bg:rgba(255,255,255,0.94);
  --panel-bg-soft:rgba(255,255,255,0.88);
  --panel-border:rgba(15,23,42,0.10);
  --panel-border-strong:rgba(15,23,42,0.18);
  --text:#0f172a;
  --muted:#66768c;
  --muted-strong:#334155;
  --input-bg:rgba(255,255,255,0.98);
  --input-border:rgba(148,163,184,0.32);
  --input-hover:rgba(37,99,235,0.08);
  --item-hover:rgba(37,99,235,0.06);
  --item-sel-bg:rgba(37,99,235,0.10);
  --item-sel-border:rgba(37,99,235,0.32);
  --surface-raised:rgba(255,255,255,0.84);
  --surface-muted:rgba(248,250,252,0.90);
  --surface-emphasis:rgba(37,99,235,0.08);
  --surface-danger:rgba(220,38,38,0.08);
  --surface-warning:rgba(202,138,4,0.10);
  --surface-success:rgba(5,150,105,0.08);
  --accent:#2563eb;
  --accent-strong:#1d4ed8;
  --accent-soft:rgba(37,99,235,0.10);
  --accent-glow:rgba(37,99,235,0.18);
  --graph-stroke:rgba(219,228,240,0.2);
  --cy-bg:transparent; --cy-edge-label:#334155; --cy-edge-text-bg:#ffffff;
  --cy-node-mod:#edf5ff; --cy-node-sub:#f1f4ff; --cy-node-ext:#eef3f8;
  --accent-m:#2563eb; --accent-s:#4f46e5; --accent-e:#64748b;
  --path-color:#d97706;
  --path-soft:rgba(217,119,6,0.10); --path-soft2:rgba(217,119,6,0.13); --path-border:rgba(217,119,6,0.28); --path-border2:rgba(217,119,6,0.48);
  --gold:#ca8a04; --red:#dc2626; --green:#059669; --cyan:#2563eb; --warm:#ea580c;
  --gold-soft:rgba(202,138,4,0.10); --gold-soft2:rgba(202,138,4,0.08); --gold-border:rgba(202,138,4,0.24); --gold-border2:rgba(202,138,4,0.40);
  --red-soft:rgba(220,38,38,0.10);
  --green-soft:rgba(5,150,105,0.08);
  --muted-soft:rgba(100,116,139,0.12);
  --accent-m-soft:rgba(37,99,235,0.12); --accent-s-soft:rgba(79,70,229,0.12); --accent-e-soft:rgba(100,116,139,0.12);
}

/* ── Base ─────────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{--sidebar-w:360px}
html,body{height:100%;overflow:hidden;
  background:radial-gradient(circle at top left,var(--bg-radial1),transparent 34%),
             radial-gradient(circle at bottom right,var(--bg-radial2),transparent 30%),
             var(--bg-body);
  color:var(--text);font-family:"IBM Plex Sans","Segoe UI","Apple Color Emoji","Segoe UI Emoji",sans-serif;
}
body.sidebar-open{overflow:hidden}
.shell{position:relative;display:grid;grid-template-columns:minmax(0,1fr) var(--sidebar-w);height:100vh;transition:grid-template-columns 180ms ease}
body.sidebar-collapsed .shell{grid-template-columns:minmax(0,1fr) 0}
.stage{position:relative;overflow:hidden;height:100vh;border-right:1px solid var(--shell-line)}
#cy{position:absolute;inset:0;width:100%;height:100%;background:
  linear-gradient(var(--graph-stroke) 1px, transparent 1px),
  linear-gradient(90deg,var(--graph-stroke) 1px, transparent 1px),
  var(--cy-bg);
  background-size:32px 32px,32px 32px,auto;
  background-position:-1px -1px,-1px -1px,0 0;
}
.appbar{position:absolute;top:18px;left:18px;right:auto;display:flex;flex-direction:column;
  align-items:flex-start;gap:10px;padding:12px 14px;border:1px solid var(--panel-border);background:var(--panel-bg-soft);z-index:6;
  backdrop-filter:blur(12px);box-shadow:0 18px 40px rgba(2,6,23,0.14);border-radius:16px;
  width:min(350px,calc(100vw - var(--sidebar-w) - 32px));
  max-width:calc(100vw - var(--sidebar-w) - 32px);
  animation:barIn 360ms ease}
.brand-block{display:flex;flex-direction:column;gap:4px;min-width:0}
.brand-kicker{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.brand-title{font-size:20px;line-height:.98;font-weight:700;letter-spacing:-.04em;overflow-wrap:anywhere}
.brand-copy{display:none}
.appbar-meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px;min-width:0;font-size:12px;line-height:1.35;color:var(--muted-strong)}
.appbar-meta strong{font-size:12px;color:var(--text)}
.meta-sep{opacity:.45}
.appbar-actions{display:flex;flex-wrap:wrap;align-items:center;gap:8px;flex-shrink:0;min-width:0}
.appbar-controls{display:flex;flex-direction:column;gap:10px;width:100%;min-width:0}
.appbar-control-row{display:flex;flex-wrap:wrap;align-items:flex-start;gap:8px;min-width:0}
.appbar-control-row.compact .app-btn{padding:8px 10px}
.appbar-slider{display:flex;align-items:center;gap:10px;min-width:0;flex:1 1 220px;padding:8px 10px;border:1px solid var(--input-border);
  border-radius:12px;background:var(--surface-raised)}
.appbar-slider label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.appbar-slider input[type=range]{flex:1;min-width:76px}
.appbar-slider-value{min-width:38px;text-align:right;font-size:11px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.app-btn,.btn,.tab,.lbtn,.tbtn,.hbtn{font-family:inherit}
.app-btn,.btn,.tab,.lbtn,.tbtn{
  border:1px solid var(--input-border);background:var(--surface-raised);color:var(--text);
  border-radius:12px;cursor:pointer;transition:background 140ms,border-color 140ms,color 140ms,opacity 140ms
}
.app-btn{padding:7px 10px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.app-btn:hover,.btn:hover,.tab:hover,.lbtn:hover,.tbtn:hover{border-color:var(--accent);background:var(--input-hover)}
.app-btn.on{border-color:var(--gold-border2);background:var(--gold-soft);color:var(--gold)}
.app-btn.focus-btn.on{border-color:var(--accent);background:var(--accent-soft);color:var(--text)}
.app-btn.mobile-only{display:none}
.control-rail{position:absolute;top:18px;right:18px;display:flex;flex-direction:column;gap:12px;z-index:5;
  width:min(264px,calc(100vw - 36px))}
.rail-panel{padding:12px;border-radius:16px;border:1px solid var(--panel-border);background:var(--panel-bg-soft);
  backdrop-filter:blur(10px);box-shadow:0 18px 34px rgba(2,6,23,0.12)}
.rail-title{margin-bottom:8px;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.toolbar-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.toolbar-grid .lbtn:last-child:nth-child(odd){grid-column:1/-1}
.lbtn{padding:8px 10px;font-size:11px;font-weight:600;background:transparent}
.rail-slider{display:flex;align-items:center;gap:8px}
.rail-stack{display:flex;flex-direction:column;gap:8px}
.tbtn{padding:10px 12px;text-align:left}
.tbtn strong{display:block;font-size:11px;margin-bottom:2px}
.tbtn span{display:block;color:var(--muted);font-size:10px;line-height:1.35}
.tbtn.on{border-color:var(--gold-border2);background:var(--gold-soft);color:var(--gold)}
.tbtn.path-on{border-color:var(--path-border2);background:var(--path-soft);color:var(--path-color)}
.tbtn:disabled{opacity:.45;cursor:not-allowed}
.sidebar-toggle-inline{display:flex;align-items:center;justify-content:center;align-self:stretch;gap:8px;padding:10px 12px;border:1px solid var(--panel-border-strong);
  border-radius:14px;background:var(--panel-bg);color:var(--text);backdrop-filter:blur(10px);box-shadow:0 14px 30px rgba(2,6,23,0.18);
  cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;position:relative;z-index:1}
.sidebar-toggle-inline:hover{border-color:var(--accent);background:var(--input-hover)}
.collapsed-hint{display:none;align-self:stretch;padding:10px 12px;border-radius:14px;border:1px dashed var(--panel-border-strong);background:var(--panel-bg-soft);
  color:var(--muted-strong);font-size:11px;line-height:1.4}
body.sidebar-collapsed .collapsed-hint{display:block}
.graph-key{position:absolute;left:18px;bottom:18px;display:flex;flex-wrap:wrap;gap:8px;max-width:min(680px,calc(100vw - 54px));z-index:5;
  animation:barIn 420ms ease}
.key-chip{display:inline-flex;align-items:center;gap:7px;padding:8px 11px;border-radius:999px;border:1px solid var(--panel-border);
  background:var(--panel-bg-soft);backdrop-filter:blur(10px);font-size:11px;color:var(--muted-strong)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stage-empty{position:absolute;inset:0;display:grid;place-items:center;padding:32px;pointer-events:none;z-index:2;
  opacity:0;transition:opacity 180ms ease}
.stage-empty.is-visible{opacity:1}
.stage-empty-copy{max-width:540px;text-align:center;padding:22px 24px;border-radius:24px;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--panel-border);backdrop-filter:blur(10px);box-shadow:0 16px 40px rgba(2,6,23,0.06)}
.stage-empty-kicker{margin-bottom:10px;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
.stage-empty-title{font-size:clamp(20px,2.6vw,30px);line-height:1.08;letter-spacing:-.04em;font-weight:700;color:var(--text)}
.stage-empty-body{margin-top:10px;font-size:13px;line-height:1.6;color:var(--muted-strong)}
.stage-empty-body code{padding:2px 6px;border-radius:999px;background:var(--surface-emphasis);color:var(--text);font-family:inherit;font-weight:700}

/* ── Sidebar / inspector ─────────────────────────────────────────────────── */
.sidebar{background:var(--panel-bg);display:flex;flex-direction:column;overflow:hidden;z-index:7;min-width:0;position:relative}
.sidebar-resize{position:absolute;left:0;top:0;bottom:0;width:12px;transform:translateX(-50%);cursor:col-resize;z-index:9}
.sidebar-resize::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:4px;height:68px;border-radius:999px;background:var(--panel-border-strong);opacity:.8;transition:background 140ms ease,opacity 140ms ease}
.sidebar-resize:hover::before,.sidebar-resize.dragging::before{background:var(--accent);opacity:1}
body.sidebar-collapsed .sidebar{border-left:none;opacity:0;pointer-events:none}
.sidebar-header{padding:18px 18px 14px;border-bottom:1px solid var(--shell-line);display:flex;justify-content:space-between;gap:12px}
.sidebar-copy{min-width:0}
.sidebar-kicker{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.sidebar-title{display:none}
.sidebar-sub{display:none}
.sidebar-close{display:none}
.inspector-meta{display:flex;flex-wrap:wrap;gap:7px;padding:12px 18px;border-bottom:1px solid var(--shell-line)}
.tabs{display:flex;gap:8px;padding:14px 18px 0;flex-shrink:0}
.tab{flex:1;padding:11px 8px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--muted)}
.tab.on{background:var(--accent-soft);border-color:rgba(116,163,255,0.28);color:var(--text)}
.body{flex:1;overflow-y:auto;padding:18px}
.panel-section{padding:0 0 18px;margin-bottom:18px;border-bottom:1px solid var(--shell-line)}
.panel-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:4px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.section-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.section-copy{display:none}
.sticky-search{position:sticky;top:0;z-index:2;background:linear-gradient(180deg,var(--panel-bg) 72%,transparent);padding-bottom:12px}
.summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
.summary-cell{padding:10px 11px;border-radius:12px;border:1px solid var(--panel-border);background:var(--surface-muted)}
.summary-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.summary-value{margin-top:5px;font-size:16px;font-weight:700;letter-spacing:-.02em}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quick-grid .btn{min-width:0}

/* ── Form ─────────────────────────────────────────────────────────────────── */
.lbl{margin:12px 0 6px;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
.lbl:first-child{margin-top:0}
.row{display:flex;gap:8px;margin-bottom:8px}
.fi{flex:1;padding:10px 11px;border:1px solid var(--input-border);border-radius:12px;background:var(--input-bg);
  color:var(--text);font:inherit;font-size:12px;line-height:1.35}
.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.fi::placeholder{color:var(--muted);opacity:.8}
select.fi{cursor:pointer}
textarea.fi{resize:vertical;min-height:84px}
.btn{padding:10px 12px;font-size:11px;font-weight:700;white-space:nowrap}
.btn-full{width:100%;text-align:left}
.btn-warn:hover{border-color:var(--gold);background:var(--gold-soft);color:var(--gold)}
.btn-danger{color:var(--text)}
.btn-danger:hover{border-color:var(--red);background:var(--red-soft);color:var(--red)}
.msg{margin-top:8px;padding:9px 10px;border-radius:12px;background:var(--accent-soft);color:var(--accent-strong);
  font-size:11px;line-height:1.55;white-space:pre-wrap}
.msg.ok{background:var(--green-soft);color:var(--green)}

/* ── Nodes list ──────────────────────────────────────────────────────────── */
.list-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.list-copy{font-size:12px;color:var(--muted-strong)}
.nlist{display:flex;flex-direction:column;gap:6px}
.nli{display:flex;align-items:center;gap:8px;padding:10px 10px;border-radius:12px;
  cursor:pointer;font-size:12px;border:1px solid transparent;transition:background 120ms,border-color 120ms,opacity 120ms}
.nli:hover{background:var(--item-hover)}
.nli.sel{background:var(--item-sel-bg);border-color:var(--item-sel-border)}
.nli.in-path{background:var(--path-soft2);border-color:var(--path-border)}
.nli.hidden-row{opacity:.52}
.ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.ntag{font-size:9px;padding:3px 6px;border-radius:999px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.ntag-m{background:var(--accent-m-soft);color:var(--accent-m)}
.ntag-s{background:var(--accent-s-soft);color:var(--accent-s)}
.ntag-e{background:var(--accent-e-soft);color:var(--accent-e)}
.ntag-h{background:var(--muted-soft);color:var(--muted)}
.ntag-p{background:var(--path-soft);color:var(--path-color)}
.hbtn{margin-left:2px;flex-shrink:0;background:none;border:none;color:var(--muted);font-size:13px;padding:2px 4px;border-radius:6px;opacity:.8}
.hbtn:hover{opacity:1;color:var(--text);background:var(--surface-raised)}
.empty-state{padding:18px 14px;border:1px dashed var(--panel-border-strong);border-radius:14px;background:var(--surface-muted)}
.empty-title{font-size:13px;font-weight:700}
.empty-copy{display:none}

/* ── Detail / inspect ────────────────────────────────────────────────────── */
.focus-toggle{margin-bottom:12px}
.status-strip{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.status-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 9px;border-radius:999px;border:1px solid var(--panel-border);background:var(--surface-muted);font-size:11px;color:var(--muted-strong)}
.path-banner,.hbanner{margin-bottom:12px;padding:10px 11px;border-radius:12px;font-size:11px;line-height:1.45}
.hbanner{background:var(--gold-soft2);color:var(--gold);border:1px solid var(--gold-border)}
.path-banner{background:var(--path-soft);color:var(--path-color);border:1px solid var(--path-border)}
.dcard{padding:14px;border-radius:16px;border:1px solid var(--panel-border-strong);background:var(--surface-emphasis)}
.dbadge{display:inline-block;margin-bottom:10px;padding:4px 8px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.11em}
.dtitle{margin:0 0 10px;font-size:22px;line-height:1.02;letter-spacing:-.04em}
.detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.detail-stat{padding:8px 10px;border-radius:12px;border:1px solid var(--panel-border);background:var(--surface-raised);min-width:92px}
.detail-stat-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.detail-stat-value{margin-top:4px;font-size:13px;font-weight:700;overflow-wrap:anywhere;word-break:break-word}
.dblock{margin-top:14px;padding-top:14px;border-top:1px solid var(--shell-line)}
.dlbl{margin:0 0 7px;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;padding:6px 9px;border-radius:999px;border:1px solid transparent;font-size:11px;cursor:pointer}
.chip:hover{border-color:currentColor}
.relation-list{display:flex;flex-direction:column;gap:8px}
.relation-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 10px;border-radius:12px;border:1px solid var(--panel-border);background:var(--surface-raised)}
.relation-node{display:inline-flex;align-items:center;gap:8px;min-width:0;font-size:12px;font-weight:600;cursor:pointer}
.relation-node:hover{text-decoration:underline}
.relation-node-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.relation-label{flex-shrink:0;padding:4px 8px;border-radius:999px;background:var(--surface-muted);border:1px solid var(--panel-border);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-strong)}
.dtitle{overflow-wrap:anywhere;word-break:break-word}
.dacts{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

<body>
<div class="shell">
  <div class="stage">
    <header class="appbar" id="appbar">
      <div class="brand-block">
        <h1 class="brand-title">FortGraph</h1>
      </div>

<script>
'use strict';
if (typeof cytoscapeDagre !== 'undefined') cytoscape.use(cytoscapeDagre);

// ── Theme ─────────────────────────────────────────────────────────────────────
let theme = localStorage.getItem('fdt-theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('fdt-theme', t);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = t === 'dark' ? '☀ Light' : '☾ Dark';
  if (cy) {
    cy.style(buildCyStyle());
    syncGraph();
    renderSidebar();
  }
}
function toggleTheme() { applyTheme(theme === 'dark' ? 'light' : 'dark'); }
// ── Storage ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'fortran-dep-tracker-v1';
const HISTORY_LIMIT = 80;
let undoStack = [], redoStack = [];

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return fresh();
    const p = JSON.parse(raw);
    return {
      customNodes:   Array.isArray(p.customNodes)   ? p.customNodes   : [],
      customEdges:   Array.isArray(p.customEdges)   ? p.customEdges   : [],
      nodePositions: p.nodePositions || {},
      hiddenNodeIds: Array.isArray(p.hiddenNodeIds) ? p.hiddenNodeIds : [],
      perNode:       p.perNode  || {},
      global:        p.global   || '',
      focusMode:     Boolean(p.focusMode),
      textScale:     typeof p.textScale==='number' ? p.textScale : 1.0,
      performanceMode: Boolean(p.performanceMode),
      quickJumpIds:  Array.isArray(p.quickJumpIds) ? p.quickJumpIds : null,
    };
  } catch { return fresh(); }
}
function fresh() {
  return { customNodes:[], customEdges:[], nodePositions:{}, hiddenNodeIds:[], perNode:{}, global:'', focusMode:false, textScale:1.0, performanceMode:false, quickJumpIds:null };
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function snapState() {
  return JSON.stringify({ customNodes:state.customNodes, customEdges:state.customEdges,
    nodePositions:state.nodePositions, hiddenNodeIds:state.hiddenNodeIds });
}

let state = loadState();
let performanceReminderShown = false;

function applyState(next, record=true) {
  if (record) {
    const prev = snapState();
    const after = JSON.stringify({ customNodes:next.customNodes||state.customNodes,
      customEdges:next.customEdges||state.customEdges,
      nodePositions:next.nodePositions||state.nodePositions,
      hiddenNodeIds:next.hiddenNodeIds||state.hiddenNodeIds });
    if (prev !== after) {
      undoStack.push(JSON.parse(prev));
      if (undoStack.length > HISTORY_LIMIT) undoStack.shift();
      redoStack = [];
    }
  }
  state = { ...state, ...next };
  saveState(); syncGraph(); renderSidebar();
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.parse(snapState()));
  const prev = undoStack.pop();
  state = { ...state, ...prev };
  saveState(); syncGraph(); renderSidebar();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.parse(snapState()));
  const next = redoStack.pop();
  state = { ...state, ...next };
  saveState(); syncGraph(); renderSidebar();
}

function clearAllCache() {
  if (!confirm('This will permanently delete ALL nodes, edges, notes, and cached data. Continue?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = fresh();
  undoStack = []; redoStack = [];
  selectedId = null; pathSet.clear();
  syncGraph(); renderSidebar();
}

// ── Path selection mode ───────────────────────────────────────────────────────
let pathMode = false;
let pathSet  = new Set(); // node IDs in current path selection

function togglePathMode() {
  pathMode = !pathMode;
  if (!pathMode) { pathSet.clear(); selectedId = null; }
  applyHighlight(); renderSidebar(); renderToolbar();
}
function clearPath() { pathSet.clear(); applyHighlight(); renderSidebar(); }

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  const inInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

  // Undo / Redo
  if ((e.metaKey || e.ctrlKey) && !e.altKey && e.key.toLowerCase() === 'z') {
    e.preventDefault(); e.shiftKey ? redo() : undo(); return;
  }
  // Cmd/Ctrl+H — hide selected node
  if ((e.metaKey || e.ctrlKey) && !e.altKey && e.key.toLowerCase() === 'h') {
    e.preventDefault();
    if (selectedId) toggleHide(selectedId);
    return;
  }
  // Delete / Backspace — delete selected node (not when typing)
  if ((e.key === 'Delete' || e.key === 'Backspace') && !inInput) {
    if (selectedId) { deleteNode(selectedId); }
    return;
  }
  // Escape — deselect / exit path mode
  if (e.key === 'Escape') {
    if (pathMode) { togglePathMode(); }
    else { selectedId = null; applyHighlight(); renderSidebar(); }
  }
});

// ── Cytoscape ─────────────────────────────────────────────────────────────────
let selectedId = null;
const DEFAULT_MIN_ZOOM = 0.002;
const DEFAULT_MAX_ZOOM = 3;
const DEFAULT_FIT_PADDING = 40;
const DEFAULT_SLIDER_MIN_ZOOM = 0.02;
const DEFAULT_SLIDER_MAX_ZOOM = 2.5;

const cy = cytoscape({
  container: document.getElementById('cy'),
  style: buildCyStyle(),
  elements: [],
  layout: { name: 'preset' },
  wheelSensitivity: 0.3,
  minZoom: DEFAULT_MIN_ZOOM, maxZoom: DEFAULT_MAX_ZOOM,
  hideEdgesOnViewport: true,
  textureOnViewport: true,
  motionBlur: true,
  pixelRatio: 1,
});

function getVisibleElements() {
  return cy.elements(':visible');
}

function getFitZoom(padding = DEFAULT_FIT_PADDING) {
  if (!cy) return 1;
  const eles = getVisibleElements();
  if (!eles.length) return 1;
  const bb = eles.boundingBox();
  const innerW = Math.max(1, cy.width() - padding * 2);
  const innerH = Math.max(1, cy.height() - padding * 2);
  const zoomX = bb.w > 0 ? innerW / bb.w : DEFAULT_MAX_ZOOM;
  const zoomY = bb.h > 0 ? innerH / bb.h : DEFAULT_MAX_ZOOM;
  const zoom = Math.min(zoomX, zoomY);
  return Math.max(DEFAULT_MIN_ZOOM, Math.min(DEFAULT_MAX_ZOOM, Number.isFinite(zoom) ? zoom : 1));
}

function refreshZoomBounds() {
  if (!cy) return;
  const fitZoom = getFitZoom();
  const slider = document.getElementById('zoom-slider');
  if (slider) {
    slider.min = DEFAULT_MIN_ZOOM.toFixed(3);
    slider.max = DEFAULT_SLIDER_MAX_ZOOM.toFixed(1);
    slider.step = fitZoom < 0.1 ? '0.01' : '0.05';
  }
}

function fitGraphToViewport(padding = DEFAULT_FIT_PADDING) {
  if (!cy) return;
  refreshZoomBounds();
  const eles = getVisibleElements();
  if (!eles.length) return;
  cy.fit(eles, padding);
  refreshZoomBounds();
  syncZoomUi();
}

function getThemeVar(v) {
  return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
}

function buildCyStyle() {
  const isDark = theme === 'dark';
  const perf = Boolean(state.performanceMode);
  const ts = state.textScale || 1.0;
  const edgeFontSize = Math.max(8, Math.round(10 * ts));
  const edgeLabel   = isDark ? '#ffffff' : '#000000';
  const edgeLblBg   = isDark ? '#08111f' : '#ffffff';
  const pathColor   = perf ? (isDark ? '#ffffff' : '#000000') : (isDark ? '#f472b6' : '#db2777');
  const perfBg      = isDark ? '#050505' : '#ffffff';
  const perfBorder  = isDark ? '#ffffff' : '#000000';
  const perfSoft    = isDark ? '#d4d4d4' : '#202020';
  const perfDim     = isDark ? 0.22 : 0.16;
  return [
    { selector:'node', style:{
      shape:'roundrectangle',
      'background-color': perf ? perfBg : 'data(bgColor)',
      'border-color': perf ? perfBorder : 'data(accentColor)',
      'border-width':1, 'border-opacity':0.24,
      label:'data(label)',
      'text-valign':'center','text-halign':'center',
      'text-wrap':'wrap','text-overflow-wrap':'anywhere','text-max-width':'data(textW)',
      'text-justification':'center',
      'line-height':1.18,
      'background-image': perf ? 'none' : 'data(iconImage)',
      'background-fit':'none',
      'background-width':'24px','background-height':'24px',
      'background-position-x':'12px','background-position-y':'12px',
      'background-repeat':'no-repeat',
      'font-family':'"IBM Plex Sans","Apple Color Emoji","Segoe UI Emoji",sans-serif',
      'font-size':'data(fontSize)','font-weight':650,
      color:'data(labelColor)',
      'text-outline-width':0,
      width:'data(w)',height:'data(h)',padding:12,
      'shadow-blur': perf ? 0 : 18,
      'shadow-color':isDark ? '#000000' : '#64748b',
      'shadow-opacity':perf ? 0 : (isDark ? 0.34 : 0.18),
      'shadow-offset-x':0,'shadow-offset-y':6,
      'transition-property':'border-color,border-width,border-opacity,opacity',
      'transition-duration':190,
    }},
    { selector:'node[nodeType="module"]', style: perf ? {} : {
      'background-fill':'linear-gradient',
      'background-gradient-direction':'to-bottom-right',
      'background-gradient-stop-colors': isDark ? '#244b86 #173563 #102847' : '#ffffff #edf5ff #d9e9ff',
      'background-gradient-stop-positions':'0% 52% 100%',
      'border-color':isDark ? '#79b8ff' : '#4f8fe8',
    }},
    { selector:'node[nodeType="subroutine"]', style: perf ? {} : {
      'background-fill':'linear-gradient',
      'background-gradient-direction':'to-bottom-right',
      'background-gradient-stop-colors': isDark ? '#60478f #3f2e6e #2d2254' : '#ffffff #f5efff #e8dcff',
      'background-gradient-stop-positions':'0% 52% 100%',
      'border-color':isDark ? '#bda2ff' : '#8b63d9',
    }},
    { selector:'node[nodeType="external"]', style: perf ? {
      'border-style':'solid',
    } : {
      'background-fill':'linear-gradient',
      'background-gradient-direction':'to-bottom-right',
      'background-gradient-stop-colors': isDark ? '#8f3f68 #632b4b #461f38' : '#ffffff #fff0f7 #ffdce9',
      'background-gradient-stop-positions':'0% 52% 100%',
      'border-color':isDark ? '#ff9ac4' : '#dd5a91',
      'border-style':'solid',
    }},
    { selector:'node.sel', style:{
      'border-color': perf ? perfBorder : 'data(accentColor)','border-width':2.5,'border-opacity':0.95,
      'shadow-blur': perf ? 0 : 34,'shadow-color':'data(accentColor)','shadow-opacity':perf ? 0 : 0.52,
      'shadow-offset-x':0,'shadow-offset-y':5,'z-index':20,
    }},
    { selector:'node.nbr', style:{
      'border-color': perf ? perfSoft : 'data(accentColor)','border-width':1.6,'border-opacity':0.62,
      'shadow-blur': perf ? 0 : 22,'shadow-color':'data(accentColor)','shadow-opacity':perf ? 0 : 0.28,
      'shadow-offset-x':0,'shadow-offset-y':5,'z-index':10,
    }},
    { selector:'node.in-path', style:{
      'border-color':pathColor,'border-width':2.5,'border-opacity':0.95,
      'shadow-blur': perf ? 0 : 30,'shadow-color':pathColor,'shadow-opacity':perf ? 0 : 0.48,
      'shadow-offset-x':0,'shadow-offset-y':5,'z-index':18,
    }},
    { selector:'node.dim', style:{ opacity: perf ? perfDim : 0.15 }},
    { selector:'edge', style:{
      'curve-style':'bezier',
      'target-arrow-shape':'triangle',
      'target-arrow-color': perf ? perfBorder : 'data(edgeColor)',
      'line-color': perf ? perfBorder : 'data(edgeColor)',
      'line-style':'dashed',
      'line-dash-pattern':[7,4],
      'line-opacity':0.74,
      'target-arrow-fill':'filled','arrow-scale':1.1,
      width: perf ? 1.5 : 2.1, label: perf ? '' : 'data(label)',
      'font-size':edgeFontSize,'font-family':'"IBM Plex Mono",monospace',
      color: edgeLabel,
      'text-background-color':edgeLblBg,
      'text-background-opacity':perf ? 0 : 0.85,
      'text-background-padding':2,
      'text-background-shape':'roundrectangle',
      'transition-property':'opacity,width,line-opacity',
      'transition-duration':160,
    }},
    { selector:'edge.sel-edge', style:{'line-opacity':1,width:perf ? 2.2 : 3,'z-index':15}},
    { selector:'edge.path-edge', style:{
      'line-color':pathColor,'target-arrow-color':pathColor,
      'line-opacity':1,width:perf ? 2.2 : 3,'z-index':16,
    }},
    { selector:'edge.dim', style:{ opacity: perf ? 0.04 : 0.08 }},
  ];
}

// ── Graph sync ────────────────────────────────────────────────────────────────
const TYPE_ICON = { module: '🧩', subroutine: '⚙️', external: '📦' };
function typeIcon(t){ return TYPE_ICON[t] || '•'; }
function emojiDataUri(emoji) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><text x="16" y="23" text-anchor="middle" font-size="22" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif">${emoji}</text></svg>`;
  return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
}
function balancedNodeLabel(t, title, maxChars=24) {
  const raw = String(title || '');
  const parts = raw.split('_').filter(Boolean);

  // Split unusually long tokens so no single segment can overflow.
  const tokens = [];
  parts.forEach((part, i) => {
    const suffix = i < parts.length - 1 ? '_' : '';
    const token = part + suffix;
    if (token.length <= maxChars) tokens.push(token);
    else {
      for (let p = 0; p < token.length; p += maxChars)
        tokens.push(token.slice(p, p + maxChars));
    }
  });

  if (!tokens.length) return { label: '', lines: [''] };

  // Greedy packing followed by a small balancing pass produces centered,
  // similarly sized lines instead of a long first line and tiny last line.
  const lines = [];
  let line = '';
  tokens.forEach(token => {
    if (!line || (line + token).length <= maxChars) line += token;
    else { lines.push(line); line = token; }
  });
  if (line) lines.push(line);

  for (let i = lines.length - 1; i > 0; i--) {
    const prevTokens = lines[i - 1].match(/[^_]+_?/g) || [lines[i - 1]];
    while (prevTokens.length > 1) {
      const moved = prevTokens[prevTokens.length - 1];
      const candidatePrev = prevTokens.slice(0, -1).join('');
      const candidateCurr = moved + lines[i];
      if (candidateCurr.length > maxChars) break;
      const oldDiff = Math.abs(lines[i - 1].length - lines[i].length);
      const newDiff = Math.abs(candidatePrev.length - candidateCurr.length);
      if (newDiff >= oldDiff) break;
      prevTokens.pop();
      lines[i - 1] = candidatePrev;
      lines[i] = candidateCurr;
    }
  }

  return { label: lines.join('\n'), lines };
}
function typeInitial(t){ return t === 'module' ? 'M' : t === 'subroutine' ? 'S' : 'E'; }

function syncGraph() {
  const hidden = new Set(state.hiddenNodeIds);
  const degMap = {};
  state.customNodes.forEach(n => { degMap[n.id] = 0; });
  state.customEdges.forEach(e => {
    if (!hidden.has(e.source) && !hidden.has(e.target)) {
      if (degMap[e.source] !== undefined) degMap[e.source]++;
      if (degMap[e.target] !== undefined) degMap[e.target]++;
    }
  });
  const degs = Object.values(degMap);
  const maxD = Math.max(1, ...degs), minD = Math.min(0, ...degs);

  const isDark = theme === 'dark';
  // Fallback bg colors (gradient is applied via Cytoscape type selectors in buildCyStyle)
  const GRAD = {
    module:     isDark ? { stop1:'#12335f' } : { stop1:'#eef6ff' },
    subroutine: isDark ? { stop1:'#37246d' } : { stop1:'#f4eeff' },
    external:   isDark ? { stop1:'#612044' } : { stop1:'#fff0f7' },
  };
  const AC = { module: isDark?'#60a5fa':'#2563eb', subroutine: isDark?'#a78bfa':'#7c3aed', external: isDark?'#f472b6':'#db2777' };
  const LABEL_COLOR = isDark ? '#ffffff' : '#000000';
  const ts = state.textScale || 1.0;

  const wantNodes = new Set(), wantEdges = new Set();
  cy.startBatch();

  state.customNodes.forEach(n => {
    if (hidden.has(n.id)) { const el=cy.getElementById(n.id); if(el.length) el.remove(); return; }
    wantNodes.add(n.id);
    const deg = degMap[n.id]||0;
    const t = maxD===minD ? 0.5 : (deg-minD)/(maxD-minD);
    const fontSize = Math.round((11+t*4) * ts);
    const maxChars = Math.max(16, Math.round(25 / Math.max(1, ts * 0.72)));
    const wrapped = balancedNodeLabel(n.data.nodeType, n.data.title, maxChars);
    const rawLabel = wrapped.label;
    const charWidth = fontSize * 0.59;
    const longestLine = Math.max(...wrapped.lines.map(line => line.length));
    const minW = Math.round((120+t*120) * Math.max(1, ts * 0.85 + 0.15));
    const preferredW = Math.ceil(longestLine * charWidth + 44);
    const w = Math.min(390, Math.max(minW, preferredW));
    const textW = Math.max(96, w - 52);
    const lineCount = wrapped.lines.length;
    const h = Math.max(Math.round(48+t*28), Math.ceil(lineCount * fontSize * 1.55 + 38));
    const accentColor = AC[n.data.nodeType]||AC.module;
    const g = GRAD[n.data.nodeType]||GRAD.module;
    const pos = state.nodePositions[n.id];
    const el = cy.getElementById(n.id);
    const bgColor = GRAD[n.data.nodeType] ? GRAD[n.data.nodeType].stop1 : '#07182a';
    const nodeData = { label:rawLabel, nodeType:n.data.nodeType,
      iconImage:emojiDataUri(typeIcon(n.data.nodeType)),
      accentColor, bgColor, labelColor:LABEL_COLOR, w, h, textW, fontSize };
    if (!el.length) {
      cy.add({ group:'nodes', data:{ id:n.id, ...nodeData },
        position: pos ? {x:pos.x,y:pos.y} : {x:Math.random()*600+80,y:Math.random()*400+60} });
    } else {
      el.data(nodeData);
    }
  });

  cy.nodes().forEach(el => { if(!wantNodes.has(el.id())) el.remove(); });

  state.customEdges.forEach(e => {
    if (hidden.has(e.source)||hidden.has(e.target)) { const el=cy.getElementById(e.id); if(el.length) el.remove(); return; }
    wantEdges.add(e.id);
    let ec = isDark?'#60a5fa':'#2563eb';
    if (e.style?.stroke) {
      const s=e.style.stroke;
      if (s.includes('149,224,141')||s==='#a78bfa') ec=isDark?'#a78bfa':'#7c3aed';
      else if (s.includes('244,114,182')||s==='#f472b6'||s==='#db2777') ec=isDark?'#f472b6':'#db2777';
    }
    const el = cy.getElementById(e.id);
    if (!el.length) {
      cy.add({ group:'edges', data:{ id:e.id, source:e.source, target:e.target,
        label:e.label||'', edgeColor:ec } });
    } else { el.data({ label:e.label||'', edgeColor:ec }); }
  });

  cy.edges().forEach(el => { if(!wantEdges.has(el.id())) el.remove(); });
  cy.endBatch();
  refreshZoomBounds();
  applyHighlight();
}

function applyHighlight() {
  cy.elements().removeClass('sel nbr dim sel-edge in-path path-edge');

  if (pathMode && pathSet.size > 0) {
    // highlight all path nodes and edges between them
    const pathNodes = cy.nodes().filter(n => pathSet.has(n.id()));
    const pathEdges = cy.edges().filter(e => pathSet.has(e.data('source')) && pathSet.has(e.data('target')));
    const others = cy.nodes().not(pathNodes);
    others.addClass('dim');
    cy.edges().not(pathEdges).addClass('dim');
    pathEdges.addClass('path-edge');
    pathNodes.addClass('in-path');
    return;
  }

  if (!selectedId || !cy.getElementById(selectedId).length) return;
  const selNode = cy.getElementById(selectedId);
  const connEdges = selNode.connectedEdges();
  const nbrs = connEdges.connectedNodes().not(selNode);
  cy.nodes().not(selNode).not(nbrs).addClass('dim');
  cy.edges().not(connEdges).addClass('dim');
  connEdges.addClass('sel-edge');
  nbrs.addClass('nbr');
  selNode.addClass('sel');
}

// ── Data helpers ──────────────────────────────────────────────────────────────
function ensureModule(nodes,edges,title,msgs){
  let n=nodes.find(x=>x.data.title.toLowerCase()===title.toLowerCase());
  if(n){if(n.data.nodeType==='external'){n.data.nodeType='module';n.data.flag='Module';msgs&&msgs.push('↑ '+title);}return n;}
  const mc=nodes.filter(x=>x.data.nodeType==='module').length;
  const id='n-mod-'+Date.now()+'-'+Math.random().toString(36).slice(2,5);
  const node={id,type:'workflow',position:{x:60+mc*200,y:40},data:{nodeType:'module',title,flag:'Module'}};
  nodes.push(node); msgs&&msgs.push('+ module: '+title); return node;
}
function ensureSubroutine(nodes,edges,title,msgs){
  let n=nodes.find(x=>x.data.title.toLowerCase()===title.toLowerCase());
  if(n){if(n.data.nodeType==='external'){n.data.nodeType='subroutine';n.data.flag='Subroutine';msgs&&msgs.push('↑ '+title);}return n;}
  const sc=nodes.filter(x=>x.data.nodeType==='subroutine').length;
  const id='n-sub-'+Date.now()+'-'+Math.random().toString(36).slice(2,5);
  const node={id,type:'workflow',position:{x:60+sc*200,y:160},data:{nodeType:'subroutine',title,flag:'Subroutine'}};
  nodes.push(node); msgs&&msgs.push('+ sub: '+title); return node;
}
function ensureEdge(edges,source,target,label,isDashed,colorHint){
  if(edges.find(e=>e.source===source&&e.target===target&&(e.label||'')===(label||''))) return false;
  edges.push({id:'e-'+Date.now()+'-'+Math.random().toString(36).slice(2,5),
    source,target,label:label||'',data:{isDashed:true},
    style:{stroke:colorHint||'#a3b8d6'}});
  return true;
}

function normalizeUseStatements(text){
  const statements = [];
  let buffer = '';
  let pendingUse = false;
  let malformed = 0;
  text.split('\n').forEach(rawLine => {
    const line = rawLine.replace(/!.*$/, '').trim();
    if (!line) return;

    if (!pendingUse) {
      if (!/^use\b/i.test(line)) return;
      buffer = line;
      pendingUse = true;
    } else {
      buffer += ' ' + line.replace(/^&\s*/, '');
    }

    if (/&\s*$/.test(buffer)) {
      buffer = buffer.replace(/\s*&\s*$/, '').trim();
      return;
    }

    statements.push(buffer.trim());
    buffer = '';
    pendingUse = false;
  });

  if (pendingUse && buffer) malformed++;
  return { statements, malformed };
}

function parseUseClause(line){
  const match = line.match(/^use\s+([\w_]+)(?:\s*,\s*only\s*:\s*(.+))?$/i);
  if (!match) return null;
  return {
    moduleName: match[1].trim(),
    onlySymbols: match[2] ? match[2].split(',').map(s => s.trim()).filter(Boolean) : []
  };
}

const DEFAULT_SIDEBAR_WIDTH = 360;
const MIN_SIDEBAR_WIDTH = 320;
const MAX_SIDEBAR_WIDTH = 680;
let activeTab='build', nodeQuery='', sidebarOpen=false, sidebarCollapsed=false;
let sidebarWidth = Number(localStorage.getItem('fdt-sidebar-width')) || DEFAULT_SIDEBAR_WIDTH;
function isMobileLayout(){ return window.matchMedia('(max-width: 980px)').matches; }
function toggleSidebar(force){
  sidebarOpen = typeof force === 'boolean' ? force : !sidebarOpen;
  document.body.classList.toggle('sidebar-open', sidebarOpen && isMobileLayout());
}
function clampSidebarWidth(width) {
  const maxAllowed = Math.min(MAX_SIDEBAR_WIDTH, Math.max(MIN_SIDEBAR_WIDTH, window.innerWidth - 280));
  return Math.max(MIN_SIDEBAR_WIDTH, Math.min(maxAllowed, width));
}
function applySidebarWidth() {
  sidebarWidth = clampSidebarWidth(sidebarWidth || DEFAULT_SIDEBAR_WIDTH);
  document.documentElement.style.setProperty('--sidebar-w', `${sidebarWidth}px`);
  localStorage.setItem('fdt-sidebar-width', String(sidebarWidth));
}
function applySidebarCollapsed() {
  document.body.classList.toggle('sidebar-collapsed', sidebarCollapsed && !isMobileLayout());
  const toggle = document.getElementById('sidebar-toggle');
  if (toggle) {
    toggle.textContent = sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar';
    toggle.setAttribute('aria-label', sidebarCollapsed ? 'Expand inspector' : 'Collapse inspector');
  }
}
function initSidebarResize() {
  const handle = document.getElementById('sidebar-resize');
  if (!handle) return;
  const stopDrag = () => {
    handle.classList.remove('dragging');
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', stopDrag);
  };
  const onMove = (event) => {
    if (isMobileLayout() || sidebarCollapsed) return;
    sidebarWidth = clampSidebarWidth(window.innerWidth - event.clientX);
    applySidebarWidth();
    if (cy) {
      cy.resize();
      refreshZoomBounds();
    }
  };
  handle.addEventListener('pointerdown', event => {
    if (isMobileLayout() || sidebarCollapsed) return;
    event.preventDefault();
    handle.classList.add('dragging');
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', stopDrag);
  });
}
function toggleSidebarCollapsed(force) {
  sidebarCollapsed = typeof force === 'boolean' ? force : !sidebarCollapsed;
  applySidebarCollapsed();
}

  activeTab=t;

function addModule(){
  const inp=document.getElementById('mod-inp');
  const title=(inp?inp.value:'').trim(); if(!title) return;
  const nodes=state.customNodes.map(n=>({...n,data:{...n.data}}));
  const edges=[...state.customEdges]; const msgs=[];
  const prev=nodes.length;
  ensureModule(nodes,edges,title,msgs);
  if(nodes.length===prev){showMsg('parse-msg','"'+title+'" already exists.');return;}
  let wired=0;
  const modNode=nodes.find(x=>x.data.title.toLowerCase()===title.toLowerCase());
  nodes.forEach(n=>{
    if(n.data.nodeType==='subroutine'&&n.data.parentName&&n.data.parentName.toLowerCase()===title.toLowerCase())
      if(ensureEdge(edges,modNode.id,n.id,'contains',false,'#a78bfa')) wired++;
  });
  applyState({customNodes:nodes,customEdges:edges}); inp.value='';
  if(wired) showMsg('parse-msg','Added "'+title+'" · wired '+wired+' sub(s).',true);
}

function addSubroutine(){
  const inp=document.getElementById('sub-inp'),parEl=document.getElementById('sub-par');
  const title=(inp?inp.value:'').trim(); if(!title) return;
  const parentId=parEl?parEl.value:'';
  const nodes=state.customNodes.map(n=>({...n,data:{...n.data}}));
  const edges=[...state.customEdges]; const msgs=[];
  const prev=nodes.length;
  ensureSubroutine(nodes,edges,title,msgs);
  if(nodes.length===prev){showMsg('parse-msg','"'+title+'" already exists.');return;}
  const subNode=nodes.find(n=>n.data.title.toLowerCase()===title.toLowerCase());
  let wired=0;
  if(parentId){
    const par=nodes.find(n=>n.id===parentId);
    if(par){subNode.data.parentId=par.id;subNode.data.parentName=par.data.title;
      if(ensureEdge(edges,par.id,subNode.id,'contains',false,'#a78bfa')) wired++;}
  }
  applyState({customNodes:nodes,customEdges:edges}); inp.value=''; if(parEl) parEl.value='';
  if(wired) showMsg('parse-msg','Added "'+title+'" · wired to parent.',true);
}

function parseUse(){
  const txt=document.getElementById('use-txt'),srcEl=document.getElementById('use-src');
  if(!txt||!txt.value.trim()) return;
  const parsedInput = normalizeUseStatements(txt.value);
  const lines = parsedInput.statements;
  if(!lines.length){showMsg('parse-msg','No USE statements found.');return;}
  const nodes=state.customNodes.map(n=>({...n,data:{...n.data}}));
  const edges=[...state.customEdges]; const msgs=[];
  let addedN=0,addedE=0,skip=0,malformed=parsedInput.malformed;
  const srcNode=srcEl&&srcEl.value?nodes.find(n=>n.id===srcEl.value):null;
  lines.forEach(line=>{
    const parsedLine = parseUseClause(line);
    if(!parsedLine){malformed++;return;}
    const modTitle=parsedLine.moduleName;
    const onlySyms=parsedLine.onlySymbols;
    const prev=nodes.length;
    const modNode=ensureModule(nodes,edges,modTitle,msgs);
    if(nodes.length>prev) addedN++;
    if(srcNode&&!onlySyms.length){
      if(ensureEdge(edges,srcNode.id,modNode.id,'USE',true)) addedE++; else skip++;
    }
    onlySyms.forEach(sym=>{
      if(srcNode){
        if(ensureEdge(edges,srcNode.id,modNode.id,'ONLY: '+sym,true)) addedE++; else skip++;
      }
    });
  });
  applyState({customNodes:nodes,customEdges:edges});
  showMsg('parse-msg',lines.length+' stmt(s) · '+addedN+' node(s) · '+addedE+' edge(s)'+(skip?' · '+skip+' dup':'')+(malformed?' · '+malformed+' malformed':'')+(msgs.length?'\n'+msgs.join('\n'):''),true);
  txt.value='';
}

}

async function importJSONFile(file){
  if(!file) return;
  try{
    const imported=JSON.parse(await file.text());
    if(!imported||!Array.isArray(imported.nodes)||!Array.isArray(imported.edges))
      throw new Error('Expected a JSON object containing "nodes" and "edges" arrays.');

    const existingNodes=state.customNodes.map(n=>({...n,data:{...n.data}}));
    const existingEdges=state.customEdges.map(e=>({...e,data:{...(e.data||{})},style:{...(e.style||{})}}));
    const existingByTitle=new Map(existingNodes.map(n=>[n.data.title.trim().toLowerCase(),n]));
    const usedNodeIds=new Set(existingNodes.map(n=>n.id));
    const usedEdgeIds=new Set(existingEdges.map(e=>e.id));
    const idMap=new Map();
    const addedNodes=[];
    let mergedNodes=0;

    imported.nodes.forEach((n,i)=>{
      const title=String(n?.title??n?.data?.title??'').trim();
      const nodeType=String(n?.type??n?.nodeType??n?.data?.nodeType??'').toLowerCase();
      if(!title) throw new Error(`Node ${i+1} has no title.`);
      if(!['module','subroutine','external'].includes(nodeType))
        throw new Error(`Node "${title}" has an unsupported type: ${nodeType||'(missing)'}.`);

      const sourceId=String(n?.id||`n-import-${i+1}`);
      const matching=existingByTitle.get(title.toLowerCase());
      if(matching){
        idMap.set(sourceId,matching.id);
        // Preserve existing metadata, but upgrade an external placeholder when the import is more specific.
        if(matching.data.nodeType==='external'&&nodeType!=='external'){
          matching.data.nodeType=nodeType;
          matching.data.flag=nodeType[0].toUpperCase()+nodeType.slice(1);
        }
        if(!matching.data.parentId&&n?.parentId) matching.data.parentId=String(n.parentId);
        if(!matching.data.parentName&&n?.parentName) matching.data.parentName=String(n.parentName);
        mergedNodes++;
        return;
      }

      let id=sourceId;
      let suffix=1;
      while(usedNodeIds.has(id)) id=`${sourceId}-import-${suffix++}`;
      usedNodeIds.add(id);
      idMap.set(sourceId,id);
      const node={
        id,
        type:'workflow',
        position:{x:0,y:0},
        data:{
          nodeType,
          title,
          flag:nodeType[0].toUpperCase()+nodeType.slice(1),
          ...(n.parentId?{parentId:String(n.parentId)}:{}),
          ...(n.parentName?{parentName:String(n.parentName)}:{}),
        },
      };
      addedNodes.push(node);
      existingNodes.push(node);
      existingByTitle.set(title.toLowerCase(),node);
    });

    const edgeKey=e=>`${e.source}\u0000${e.target}\u0000${e.label||''}`;
    const existingEdgeKeys=new Set(existingEdges.map(edgeKey));
    let addedEdges=0, skippedEdges=0;

    imported.edges.forEach((e,i)=>{
      const rawSource=String(e?.source??'');
      const rawTarget=String(e?.target??'');
      const source=idMap.get(rawSource);
      const target=idMap.get(rawTarget);
      if(!source||!target)
        throw new Error(`Edge ${i+1} refers to a node that is not present in the import.`);

      const label=String(e?.label??'');
      const key=`${source}\u0000${target}\u0000${label}`;
      if(existingEdgeKeys.has(key)){skippedEdges++;return;}

      const type=String(e?.type??'').toLowerCase();
      const baseId=String(e?.id||`e-import-${i+1}-${Date.now()}`);
      let id=baseId, suffix=1;
      while(usedEdgeIds.has(id)) id=`${baseId}-import-${suffix++}`;
      usedEdgeIds.add(id);
      existingEdgeKeys.add(key);
      existingEdges.push({
        id,source,target,label,
        data:{isDashed:type==='use'||Boolean(e?.data?.isDashed)},
        style:{stroke:type==='use'?'#f472b6':'#a78bfa'},
      });
      addedEdges++;
    });

    const nodePositions={...state.nodePositions};
    const existingPositionValues=Object.values(state.nodePositions||{});
    const maxExistingX=existingPositionValues.length
      ?Math.max(...existingPositionValues.map(p=>Number(p.x)||0))
      :0;
    const importedPositionValues=imported.nodes
      .map(n=>n?.position)
      .filter(p=>p&&Number.isFinite(Number(p.x))&&Number.isFinite(Number(p.y)));
    const minImportedX=importedPositionValues.length
      ?Math.min(...importedPositionValues.map(p=>Number(p.x)))
      :0;
    const xOffset=existingNodes.length-addedNodes.length>0 ? maxExistingX-minImportedX+180 : 0;
    let positionedNewNodes=0;

    imported.nodes.forEach((n,i)=>{
      const sourceId=String(n?.id||`n-import-${i+1}`);
      const finalId=idMap.get(sourceId);
      if(!finalId||state.customNodes.some(x=>x.id===finalId)) return;
      const p=n?.position;
      if(p&&Number.isFinite(Number(p.x))&&Number.isFinite(Number(p.y))){
        nodePositions[finalId]={x:Number(p.x)+xOffset,y:Number(p.y)};
        positionedNewNodes++;
      }
    });

    if(!addedNodes.length&&!addedEdges){
      showMsg('export-msg',`Nothing new to import · ${mergedNodes} existing node(s) matched · ${skippedEdges} duplicate edge(s) skipped.`,true);
      return;
    }

    undoStack.push(JSON.parse(snapState()));
    if(undoStack.length>HISTORY_LIMIT) undoStack.shift();
    redoStack=[];
    state={...state,customNodes:existingNodes,customEdges:existingEdges,nodePositions};
    saveState();syncGraph();renderSidebar();

    if(addedNodes.length&&positionedNewNodes<addedNodes.length)
      setTimeout(()=>runLayout('dagre-lr'),80);
    else
      setTimeout(()=>fitGraphToViewport(),80);

    showMsg('export-msg',
      `Merged JSON · ${addedNodes.length} node(s) added · ${mergedNodes} existing node(s) matched · ${addedEdges} edge(s) added${skippedEdges?` · ${skippedEdges} duplicate edge(s) skipped`:''}.`,
      true);
  }catch(err){
    showMsg('export-msg','Import failed: '+(err?.message||String(err)));
  }
}

function exportDOT(){
  const AC={module:theme==='dark'?'#60a5fa':'#2563eb',subroutine:theme==='dark'?'#a78bfa':'#7c3aed',external:theme==='dark'?'#f472b6':'#db2777'};
  let dot='digraph fortran_deps {\n  rankdir=LR;\n  node [shape=box style=filled fontname="monospace"];\n';
  state.customNodes.forEach(n=>{const c=AC[n.data.nodeType]||'#aaa';dot+=`  "${n.data.title}" [fillcolor="${c}" label="${n.data.title}\\n(${n.data.nodeType})"];\n`;});
  state.customEdges.forEach(e=>{const sn=state.customNodes.find(n=>n.id===e.source),tn=state.customNodes.find(n=>n.id===e.target);if(!sn||!tn)return;dot+=`  "${sn.data.title}" -> "${tn.data.title}"${e.label?' [label="'+e.label+'"]':''};\n`;});
  dot+='}\n'; dl(dot,'fortran-deps.dot','text/plain');
  showMsg('export-msg','Saved fortran-deps.dot',true);
  setTimeout(()=>{const el=document.getElementById('export-msg');if(el)el.innerHTML='';},3000);
}
function dl(content,filename,mime){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:mime}));a.download=filename;a.click();URL.revokeObjectURL(a.href);}

function selectNodeById(id){
  if(pathMode){
    if(pathSet.has(id)) pathSet.delete(id); else pathSet.add(id);
    applyHighlight(); renderSidebar(); return;
  }
  selectedId=id; applyHighlight();
  const el=cy.getElementById(id);
  if(el.length) cy.animate({center:{eles:el},zoom:Math.max(cy.zoom(),0.9)},{duration:400});
  if (isMobileLayout()) {
    activeTab='inspect';
    toggleSidebar(true);
  }
  renderSidebar();
}
function toggleHide(id){
  const hidden=state.hiddenNodeIds||[];
  applyState({hiddenNodeIds:hidden.includes(id)?hidden.filter(x=>x!==id):[...hidden,id]});
  if(selectedId===id) selectedId=null;
  if(pathSet.has(id)){pathSet.delete(id);applyHighlight();}
}
function showAllNodes(){applyState({hiddenNodeIds:[]});}
function clearAll(){if(!confirm('Clear all nodes and edges?'))return;applyState({customNodes:[],customEdges:[],nodePositions:{},hiddenNodeIds:[],quickJumpIds:null});selectedId=null;pathSet.clear();activeTab='build';}

function getDefaultQuickJumpIds(){
  const hidden = new Set(state.hiddenNodeIds);
  return state.customNodes.filter(n=>!hidden.has(n.id)).slice(0,12).map(n=>n.id);
}

function getQuickJumpNodes(){
  const hidden = new Set(state.hiddenNodeIds);
  const ids = Array.isArray(state.quickJumpIds) ? state.quickJumpIds : getDefaultQuickJumpIds();
  return ids
    .map(id => state.customNodes.find(n => n.id === id))
    .filter(n => n && !hidden.has(n.id));
}

function customizeQuickJump(mutator){
  const base = Array.isArray(state.quickJumpIds) ? [...state.quickJumpIds] : getDefaultQuickJumpIds();
  const next = mutator(base.filter((id, idx, arr) => arr.indexOf(id) === idx));
  applyState({quickJumpIds: next});
}

function addToQuickJump(id){
  customizeQuickJump(ids => ids.includes(id) ? ids : [...ids, id]);
}

function removeFromQuickJump(id){
  customizeQuickJump(ids => ids.filter(x => x !== id));
}

function resetQuickJump(){
  applyState({quickJumpIds: null});
}

  <div class="detail-meta">

  ${incoming.length?`<div class="dblock"><p class="dlbl">Used by ←</p><div class="relation-list">

function renameNode(id){
  const node=state.customNodes.find(n=>n.id===id);if(!node)return;
  const name=prompt('Rename:',node.data.title);if(!name||!name.trim())return;
  applyState({customNodes:state.customNodes.map(n=>n.id===id?{...n,data:{...n.data,title:name.trim()}}:n)});
}
function deleteNode(id){
  applyState({customNodes:state.customNodes.filter(n=>n.id!==id),
    customEdges:state.customEdges.filter(e=>e.source!==id&&e.target!==id),
    hiddenNodeIds:state.hiddenNodeIds.filter(x=>x!==id),
    quickJumpIds:Array.isArray(state.quickJumpIds)?state.quickJumpIds.filter(x=>x!==id):state.quickJumpIds});
  if(selectedId===id) selectedId=null;
  pathSet.delete(id); applyHighlight();
}
function updateNodeNote(v){state.perNode={...(state.perNode||{}),[selectedId]:v};saveState();
  const nb=document.querySelector('.saved-badge');
  if(v.trim()&&!nb){const s=document.querySelector('.nhead strong');if(s)s.insertAdjacentHTML('beforeend','<span class="saved-badge">saved</span>');}}
function updateGlobalNote(v){state.global=v;saveState();}
function clearNotes(){state.perNode={};state.global='';saveState();renderSidebar();}
function toggleFocusMode(){
  state.focusMode=!state.focusMode;saveState();
  if (state.focusMode) toggleSidebarCollapsed(true);
  renderSidebar();
  applySidebarCollapsed();
}
function togglePerformanceMode(){
  state.performanceMode=!state.performanceMode;
  saveState();
  cy.style(buildCyStyle());
  applyHighlight();
  renderAppChrome();
  renderToolbar();
}

function formatZoom(level) {
  return (level < 0.1 ? level.toFixed(3) : level.toFixed(2));
}

function setZoomLevel(v) {
  if (!cy) return;
  const level = Math.max(cy.minZoom(), Math.min(cy.maxZoom(), v));
  cy.zoom({
    level,
    renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 }
  });
  const out = document.getElementById('zoom-value');
  const slider = document.getElementById('zoom-slider');
  if (slider) slider.value = String(level);
  if (out) out.textContent = formatZoom(level) + '×';
}

function syncZoomUi() {
  if (!cy) return;
  const level = cy.zoom();
  const slider = document.getElementById('zoom-slider');
  const out = document.getElementById('zoom-value');
  if (slider) slider.value = String(level);
  if (out) out.textContent = formatZoom(level) + '×';
}

// ── Toolbar ───────────────────────────────────────────────────────────────────
function renderToolbar(){
  const tb=document.getElementById('toolbar');
  tb.innerHTML=`
<button class="sidebar-toggle-inline" id="sidebar-toggle" type="button" onclick="toggleSidebarCollapsed()" aria-label="${sidebarCollapsed ? 'Expand inspector' : 'Collapse inspector'}">${sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'}</button>
<div class="collapsed-hint">Expand sidebar for Build/Browse/Inspect options.</div>
<div class="rail-panel">
  <div class="rail-title">Layout</div>
  <div class="toolbar-grid">
    <button class="lbtn" onclick="runLayout('dagre-lr')">Dagre LR</button>
    <button class="lbtn" onclick="runLayout('dagre-tb')">Dagre TB</button>
    <button class="lbtn" onclick="runLayout('cose')">Force</button>
    <button class="lbtn" onclick="runLayout('breadth')">Breadth</button>
    <button class="lbtn" onclick="runLayout('circle')">Circle</button>
    <button class="lbtn" onclick="runLayout('concentric')">Concentric</button>
  </div>
  <div class="toolbar-grid" style="margin-top:6px">
    <button class="lbtn" onclick="runLayout('grid')">Grid</button>
    <button class="lbtn" onclick="fitGraphToViewport()">Fit view</button>
  </div>
</div>
`;
}

function setTextScale(v) {
  state.textScale = Math.round(v * 10) / 10;
  saveState();
  cy.style(buildCyStyle());
  syncGraph(); // re-computes fontSize for all nodes
  const out = document.getElementById('text-scale-value');
  if (out) out.textContent = state.textScale.toFixed(1) + '×';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showMsg(id,text,ok=false){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="msg${ok?' ok':''}">${esc(text)}</div>`;}

// ── Boot ──────────────────────────────────────────────────────────────────────
sidebarOpen = !isMobileLayout();
sidebarCollapsed = Boolean(state.focusMode) && !isMobileLayout();
applySidebarWidth();
initSidebarResize();
applyTheme(theme);
toggleSidebar(false);
applySidebarCollapsed();
setTimeout(()=>fitGraphToViewport(),200);
</script>
</body>
</html>
